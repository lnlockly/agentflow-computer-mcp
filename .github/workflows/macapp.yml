name: macapp

on:
  push:
    branches: [main]
    paths:
      - 'macapp/**'
      - '.github/workflows/macapp.yml'
  pull_request:
    paths:
      - 'macapp/**'
      - '.github/workflows/macapp.yml'

jobs:
  build-and-test:
    # PRs need the `needs-mac-runner` label to consume paid macOS minutes.
    # Pushes to main always run.
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'needs-mac-runner')
    runs-on: macos-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: macapp
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode / Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Assemble .app
        run: ./scripts/build-app.sh

      - name: Verify bundle size <= 5 MB
        run: |
          size_bytes=$(du -sk .build/AgentFlow.app | awk '{print $1*1024}')
          echo "bundle size: $size_bytes bytes"
          if [ "$size_bytes" -gt 5242880 ]; then
            echo "FAIL: bundle exceeds 5 MB cap"
            exit 1
          fi

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentFlow-app
          path: macapp/.build/AgentFlow.app
          retention-days: 14
