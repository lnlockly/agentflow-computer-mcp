name: CI

# Public repo → GitHub Actions hosted runners are free with no time
# limits, so macOS + Windows are first-class blocking jobs again.
# Linux still uses the ff-france self-hosted runner to keep that lane
# fast and offload work from GitHub.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-linux:
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo -n apt-get update -y || true
          sudo -n apt-get install -y wmctrl xdotool xclip xvfb || true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test (under Xvfb)
        run: |
          xvfb-run -a pytest -v
      - name: Selftest
        run: |
          xvfb-run -a agentflow-desktop selftest || echo "selftest may report partial results without a real desktop session"

  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -v
      - name: Selftest
        run: agentflow-desktop selftest

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -v
      - name: Selftest
        run: agentflow-desktop selftest
