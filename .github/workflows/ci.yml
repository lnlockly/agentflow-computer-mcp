name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pytest pytest-asyncio ruff
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -v

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (skip pyobjc on linux)
        run: |
          python -m pip install --upgrade pip
          pip install mcp websockets pillow pytest pytest-asyncio ruff
          pip install pyautogui || true
          pip install -e . --no-deps
      - name: Lint
        run: ruff check src tests
