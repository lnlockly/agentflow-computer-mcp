name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI runs on the self-hosted runner at ff-france (labels:
# self-hosted,Linux,X64,computer-mcp). lnlockly GitHub Actions billing
# is currently blocked, so hosted ubuntu/macos/windows runners would
# error before the workflow could start. macOS and Windows test jobs
# stay commented until matching self-hosted runners exist.

jobs:
  test-linux:
    runs-on: [self-hosted, Linux, X64, computer-mcp]
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wmctrl xdotool xclip xvfb
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests
      - name: Test (under Xvfb)
        run: |
          xvfb-run -a python -m pytest -v
      - name: Selftest
        run: |
          xvfb-run -a python -m agentflow_computer_mcp.desktop_cli selftest || echo "selftest may report partial results without a real desktop session"

