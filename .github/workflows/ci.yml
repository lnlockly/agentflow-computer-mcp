name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -v
      - name: Selftest
        # Selftest also exercises `auth_file` + `scope_file_parseable`
        # which only exist on real installs (post `install.sh` run).
        # On a clean CI runner those two checks legitimately fail, so the
        # step is informational — the `pytest` step above is the
        # blocking gate.
        continue-on-error: true
        run: agentflow-desktop selftest

  test-linux:
    # ff-france self-hosted runner — bypasses the GitHub Actions billing
    # block on the lnlockly account. macOS + Windows jobs still need
    # billing for hosted runners since the self-hosted box is Linux-only.
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          # Self-hosted runner reuses the host between jobs, so these are
          # mostly already present after the first run. Best-effort, no
          # sudo prompts: if apt fails (eg already-installed lock), the
          # subsequent pytest step still validates what we actually need.
          sudo -n apt-get update -y || true
          # python3-tk + python3-dev are required by pyautogui's MouseInfo
          # init; without them the import raises SystemExit("install tkinter")
          # which makes any test that touches pyautogui fail at collection.
          sudo -n apt-get install -y wmctrl xdotool xclip xvfb python3-tk python3-dev || true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test (under Xvfb)
        run: |
          xvfb-run -a pytest -v
      - name: Selftest
        continue-on-error: true
        run: |
          xvfb-run -a agentflow-desktop selftest || echo "selftest may report partial results without a real desktop session"

  multi-agent-selftest:
    # End-to-end harness for the multi-agent runtime (#89).
    # Spawns the daemon in a child process, drives it over the UNIX
    # socket, asserts lifecycle guarantees (spawn/list/pause/resume/
    # scope-isolation). POSIX-only; runs on the same self-hosted
    # Linux box that owns the rest of the linux CI.
    needs: test-linux
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Multi-agent self-test
        run: |
          pytest tests/integration/test_multi_agent_lifecycle.py -x -v --timeout=120

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -v
      - name: Selftest
        continue-on-error: true
        run: agentflow-desktop selftest
