name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -v
      - name: Selftest
        run: agentflow-desktop selftest

  test-linux:
    # ff-france self-hosted runner — bypasses the GitHub Actions billing
    # block on the lnlockly account. macOS + Windows jobs still need
    # billing for hosted runners since the self-hosted box is Linux-only.
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          # Self-hosted runner reuses the host between jobs, so these are
          # mostly already present after the first run. Best-effort, no
          # sudo prompts: if apt fails (eg already-installed lock), the
          # subsequent pytest step still validates what we actually need.
          sudo -n apt-get update -y || true
          sudo -n apt-get install -y wmctrl xdotool xclip xvfb || true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test (under Xvfb)
        run: |
          xvfb-run -a pytest -v
      - name: Selftest
        run: |
          xvfb-run -a agentflow-desktop selftest || echo "selftest may report partial results without a real desktop session"

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -v
      - name: Selftest
        run: agentflow-desktop selftest
