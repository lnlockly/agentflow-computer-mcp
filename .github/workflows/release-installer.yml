name: release-installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          # pystray is bundled into agentflow-tray.exe; install it on the
          # builder so PyInstaller's collect_all("pystray") finds wheels.
          python -m pip install pyinstaller pillow pystray
          python -m pip install .

      - name: Smoke — installer source must import + roundtrip before we build
        # Verifies parse_invite + write_auth_file + the daemon entry
        # point imports cleanly. If any of these regress the .exe will
        # crash on the user's PC, so block the release here.
        run: python installer/smoke.py

      - name: Build icon
        run: python installer/make_icon.py

      - name: Build setup.exe + tray.exe
        # Single spec, two EXE() blocks → dist/agentflow-desktop-setup.exe
        # and dist/agentflow-tray.exe ship side-by-side. Wizard copies
        # both into %LOCALAPPDATA%\AgentFlow\ + writes the Run-key for
        # the tray so it auto-launches on every user logon.
        run: pyinstaller installer/agentflow-setup.spec

      - name: List artifacts
        # Sanity check — both binaries must be present before selftest.
        shell: pwsh
        run: |
          Get-ChildItem dist | Format-Table Name, Length
          if (-not (Test-Path dist/agentflow-desktop-setup.exe)) {
            Write-Error "agentflow-desktop-setup.exe missing from dist/"
            exit 1
          }
          if (-not (Test-Path dist/agentflow-tray.exe)) {
            Write-Error "agentflow-tray.exe missing from dist/"
            exit 1
          }

      - name: Seed dummy creds for selftest
        # selftest checks for auth.json + computer-scope.toml under
        # %USERPROFILE%\.agentflow. On a fresh runner those don't
        # exist, so we write minimal placeholders before invoking
        # --selftest. The values are bogus on purpose — selftest
        # only verifies the files PARSE, never makes a real call.
        shell: pwsh
        run: |
          $afDir = Join-Path $env:USERPROFILE ".agentflow"
          New-Item -ItemType Directory -Force -Path $afDir | Out-Null
          $auth = @{
            api_key          = "af_live_ci_placeholder"
            device_id        = "00000000-0000-0000-0000-000000000000"
            enrollment_token = "aft_ci_placeholder"
            device_secret    = ""
            ws_url           = "wss://agentflow.website/_agents/_devices/connect"
          } | ConvertTo-Json
          Set-Content -Path (Join-Path $afDir "auth.json") -Value $auth -Encoding UTF8
          @"
          allow_apps = []
          allow_paths = []
          deny_paths = []
          shell_whitelist = []
          confirm_before = ["computer.fs.write", "computer.shell.exec"]
          max_actions_per_session = 50
          budget_usd = 2.0
          "@ | Set-Content -Path (Join-Path $afDir "computer-scope.toml") -Encoding UTF8

      - name: Self-test — bundled daemon must boot
        # Runs the artifact itself in --daemon --selftest mode. This
        # catches PyInstaller `collect_all` misses (missing hidden
        # imports, missing data files, etc.) BEFORE the binary ships
        # to users. 30s timeout — selftest is platform-backend probe
        # only, doesn't talk to the network.
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist/agentflow-desktop-setup.exe" `
              -ArgumentList "--daemon","--selftest" `
              -NoNewWindow -PassThru
          if (-not $p.WaitForExit(30000)) {
            $p.Kill()
            Write-Error "selftest timed out after 30s"
            exit 1
          }
          if ($p.ExitCode -ne 0) {
            Write-Error "selftest exited with code $($p.ExitCode)"
            exit 1
          }
          Write-Host "selftest passed"

      - name: Self-test — bundled tray --version must exit 0
        # Boots the tray .exe in argparse-only mode (no pystray GUI loop)
        # to prove the bundle contains every winapp module + pystray.
        # `--version` short-circuits before tray.run(), so this is safe
        # on the headless CI runner where there's no system tray.
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist/agentflow-tray.exe" `
              -ArgumentList "--version" `
              -NoNewWindow -PassThru -RedirectStandardOutput tray-version.log
          if (-not $p.WaitForExit(15000)) {
            $p.Kill()
            Write-Error "agentflow-tray --version timed out after 15s"
            exit 1
          }
          if ($p.ExitCode -ne 0) {
            Get-Content tray-version.log
            Write-Error "agentflow-tray --version exited $($p.ExitCode)"
            exit 1
          }
          Get-Content tray-version.log
          Write-Host "tray --version passed"

      - name: Compute sha256 + write SHA256SUMS
        # SHA256SUMS is the asset the auto-updater downloads to verify the
        # exe (un-authenticated, no GitHub API rate limit). Owner hit a
        # 403 «rate limit exceeded» on daemons polling the JSON API; the
        # public release-asset download path doesn't have that cap.
        # Release body still carries `sha256: <hex>` as a human-readable
        # backup.
        id: sha
        shell: pwsh
        run: |
          $hashSetup = (Get-FileHash -Path dist/agentflow-desktop-setup.exe -Algorithm SHA256).Hash.ToLower()
          $hashTray  = (Get-FileHash -Path dist/agentflow-tray.exe          -Algorithm SHA256).Hash.ToLower()
          Write-Host "sha256(setup): $hashSetup"
          Write-Host "sha256(tray):  $hashTray"
          "sha256=$hashSetup" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sha256_tray=$hashTray" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          # GNU sha256sum format — `<hex>  <filename>\n` (two spaces).
          $lines = @(
            "$hashSetup  agentflow-desktop-setup.exe",
            "$hashTray  agentflow-tray.exe"
          )
          $lines | Out-File -FilePath dist/SHA256SUMS -Encoding ascii

      - name: Publish to tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/agentflow-desktop-setup.exe
            dist/agentflow-tray.exe
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          body: |
            AgentFlow Desktop ${{ github.ref_name }}

            sha256 (agentflow-desktop-setup.exe): ${{ steps.sha.outputs.sha256 }}
            sha256 (agentflow-tray.exe):          ${{ steps.sha.outputs.sha256_tray }}

      - name: Publish to "latest" rolling release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          files: |
            dist/agentflow-desktop-setup.exe
            dist/agentflow-tray.exe
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          prerelease: false
          make_latest: false
          body: |
            AgentFlow Desktop ${{ github.ref_name }}

            sha256 (agentflow-desktop-setup.exe): ${{ steps.sha.outputs.sha256 }}
            sha256 (agentflow-tray.exe):          ${{ steps.sha.outputs.sha256_tray }}
