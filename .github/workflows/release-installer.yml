name: release-installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pillow
          python -m pip install .

      - name: Smoke — installer source must import + roundtrip before we build
        # Verifies parse_invite + write_auth_file + the daemon entry
        # point imports cleanly. If any of these regress the .exe will
        # crash on the user's PC, so block the release here.
        run: python installer/smoke.py

      - name: Build icon
        run: python installer/make_icon.py

      - name: Build setup.exe
        run: pyinstaller installer/agentflow-setup.spec

      - name: List artifacts
        run: dir dist

      - name: Self-test — bundled daemon must boot
        # Runs the artifact itself in --daemon --selftest mode. This
        # catches PyInstaller `collect_all` misses (missing hidden
        # imports, missing data files, etc.) BEFORE the binary ships
        # to users. 30s timeout — selftest is platform-backend probe
        # only, doesn't talk to the network.
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist/agentflow-desktop-setup.exe" `
              -ArgumentList "--daemon","--selftest" `
              -NoNewWindow -PassThru
          if (-not $p.WaitForExit(30000)) {
            $p.Kill()
            Write-Error "selftest timed out after 30s"
            exit 1
          }
          if ($p.ExitCode -ne 0) {
            Write-Error "selftest exited with code $($p.ExitCode)"
            exit 1
          }
          Write-Host "selftest passed"

      - name: Publish to tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/agentflow-desktop-setup.exe
          fail_on_unmatched_files: true

      - name: Publish to "latest" rolling release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          files: dist/agentflow-desktop-setup.exe
          fail_on_unmatched_files: true
          prerelease: false
          make_latest: false
