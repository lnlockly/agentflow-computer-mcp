name: docker-image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker/**
      - src/**
      - pyproject.toml
      - .github/workflows/docker-image.yml
  workflow_dispatch:

# One image build at a time per branch; pushes to ghcr.io/lnlockly/agentflow-daemon.
concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, ff-france]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT=${GITHUB_SHA::8}
          echo "sha=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "tags=ghcr.io/lnlockly/agentflow-daemon:latest,ghcr.io/lnlockly/agentflow-daemon:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/lnlockly/agentflow-daemon:buildcache
          cache-to: type=registry,ref=ghcr.io/lnlockly/agentflow-daemon:buildcache,mode=max
