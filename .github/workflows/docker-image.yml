name: docker-image

on:
  push:
    branches: [main]
    paths:
      - docker/**
      - src/**
      - pyproject.toml
      - .github/workflows/docker-image.yml
  workflow_dispatch:

# One image build at a time per branch — base + 3 variants chain through `needs`.
concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: base image. All variants FROM this exact sha. ───────────
  build-base:
    # Self-hosted runner registered with label `computer-mcp` — see memory
    # entry `feedback_self_hosted_runner.md`. GH-hosted runners are blocked
    # by billing for this org, so `ubuntu-latest` queues forever.
    runs-on: [self-hosted, computer-mcp]
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.tags.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT=${GITHUB_SHA::8}
          echo "sha=$SHA_SHORT" >> "$GITHUB_OUTPUT"
      - name: Build + push base
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.base
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/lnlockly/agentflow-daemon-base:latest
            ghcr.io/lnlockly/agentflow-daemon-base:${{ steps.tags.outputs.sha }}
          cache-from: type=registry,ref=ghcr.io/lnlockly/agentflow-daemon-base:buildcache
          cache-to: type=registry,ref=ghcr.io/lnlockly/agentflow-daemon-base:buildcache,mode=max

  # ── Stage 2: variants. All three depend on base by exact sha. ────────
  build-variants:
    needs: build-base
    runs-on: [self-hosted, computer-mcp]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: coder
            dockerfile: docker/Dockerfile.coder
          - name: assistant
            dockerfile: docker/Dockerfile.assistant
          - name: universal
            dockerfile: docker/Dockerfile.universal
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT=${{ needs.build-base.outputs.sha }}
          NAME=${{ matrix.variant.name }}
          TAGS="ghcr.io/lnlockly/agentflow-daemon-${NAME}:latest"$'\n'"ghcr.io/lnlockly/agentflow-daemon-${NAME}:${SHA_SHORT}"
          # Universal also publishes under the legacy `agentflow-daemon` tag
          # so existing pods spawned by agentflow-agents/src/routes/me-hosted-devices.ts
          # `renderDaemonManifest` (which pulls `agentflow-daemon:<sha>`) keep
          # rolling without a coordinated change. Drop the alias once PR-C
          # (UI + DB schema) migrates manifests to the new variant tags.
          if [[ "$NAME" == "universal" ]]; then
            TAGS+=$'\n'"ghcr.io/lnlockly/agentflow-daemon:latest"$'\n'"ghcr.io/lnlockly/agentflow-daemon:${SHA_SHORT}"
          fi
          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Build + push ${{ matrix.variant.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          push: true
          platforms: linux/amd64
          # Pin every variant to the BASE_IMAGE that was just pushed by
          # build-base — sha-tagged, not `:latest`, so a concurrent base
          # rebuild can't pollute this stack mid-matrix.
          build-args: |
            BASE_IMAGE=ghcr.io/lnlockly/agentflow-daemon-base:${{ needs.build-base.outputs.sha }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/lnlockly/agentflow-daemon-${{ matrix.variant.name }}:buildcache
          cache-to: type=registry,ref=ghcr.io/lnlockly/agentflow-daemon-${{ matrix.variant.name }}:buildcache,mode=max
